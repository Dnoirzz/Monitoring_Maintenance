name: monitoring_maintenance
description: "Aplikasi Monitoring Maintenance Mesin - Flutter Mobile App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  supabase_flutter: ^2.9.1
  intl: 0.20.2
  flutter_dotenv: ^5.1.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Password Hashing
  bcrypt: ^1.1.3

  # Caching & Performance
  cached_network_image: ^3.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  equatable: ^2.0.7
  http: ^1.2.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/NKP.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/NKP.webp
